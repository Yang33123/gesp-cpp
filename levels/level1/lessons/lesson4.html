<h1>Lesson 4：数据类型</h1>

<h2>🎯 学习目标</h2>
<ul>
<li>掌握 int、double、char、string</li>
<li>理解不同数据类型的区别</li>
</ul>

<h2>📘 基本数据类型</h2>

<div class="code-box">
int a = 10;          // 整数
double b = 3.14;     // 小数
char c = 'A';        // 单个字符
string name = "Tom"; // 字符串
</div>

<h2>⚠ 注意</h2>
<ul>
<li>char 使用单引号</li>
<li>string 使用双引号</li>
</ul>
