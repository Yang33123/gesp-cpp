<h1>Lesson 10：成绩平均分计算器</h1>

<h2>🎯 项目目标</h2>
<p>输入三门成绩，计算平均分。</p>

<div class="code-box">
#include &lt;iostream&gt;
using namespace std;

int main(){
    int a,b,c;
    cin >> a >> b >> c;
    double avg = (a + b + c) / 3.0;
    cout << "Average: " << avg;
    return 0;
}
</div>

<h2>为什么除以 3.0？</h2>
<p>为了得到小数结果，避免整数除法。</p>
