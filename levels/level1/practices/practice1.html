<div class="content">

<h1>练习 1：两数相加</h1>

<h2>📘 题目描述</h2>
<p>输入两个整数，输出它们的和。</p>

<h2>📥 示例输入</h2>
<pre>3 5</pre>

<h2>📤 示例输出</h2>
<pre>8</pre>

<h2>💻 修改代码并运行：</h2>

<textarea id="code">
#include <iostream>
using namespace std;

int main() {
    int a, b;
    cin >> a >> b;
    cout << a + b;
    return 0;
}
</textarea>

<br>
<button onclick="runCode()">▶ 运行代码</button>

<h2>📟 输出结果：</h2>
<div class="output" id="output"></div>

</div>
</div>

<script>
async function runCode() {

    const code = document.getElementById("code").value;
    const outputBox = document.getElementById("output");

    outputBox.innerText = "Running...";

    try {

        const response = await fetch("/api/run", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                code: code,
                input: ""
            })
        });

        const result = await response.json();

        console.log("server result:", result);

        if (result.run && result.run.stdout) {
            outputBox.innerText = result.run.stdout;
        } 
        else if (result.run && result.run.stderr) {
            outputBox.innerText = result.run.stderr;
        } 
        else {
            outputBox.innerText = "No output";
        }

    } catch (error) {

        outputBox.innerText = "Execution failed";
        console.error(error);

    }
}
</script>

</body>
